name: Build prerelease Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set image name
        id: image
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .		  
          file: Dockerfile
          target: runtime
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image.outputs.image_name }}:${{ steps.vars.outputs.sha_short }}
            ${{ steps.image.outputs.image_name }}:prerelease
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Trigger deployment webhook
        run: |
          curl -X POST \
            -H "X-Webhook-Token: ${{ secrets.PRERELEASE_WEBHOOK_TOKEN }}" \
            https://api-prerelease.influenceth.io/hooks/refresh-prerelease-server
