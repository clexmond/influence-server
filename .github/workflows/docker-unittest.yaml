name: Run unit tests (Docker image)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unittest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image name
        id: image
        run: |
          IMAGE=$(echo "${{ github.repository }}-unittest" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build unittest image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: unittest
          load: true
          tags: |
            ${{ steps.image.outputs.image_name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run unit tests
        run: |
          docker run --rm ${{ steps.image.outputs.image_name }}:ci
